services:
  db:
    image: postgres:16-alpine
    container_name: conquest-postgres
    restart: always
    environment:
      POSTGRES_DB: conquest_db
      POSTGRES_USER: conquest_dev
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    ports:
      - "5432:5432"
    volumes:
      - conquest-db-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${USERNAME_KEYCLOAK:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${PASSWORD_KEYCLOAK:-admin}
    ports:
      - "8080:8080"



