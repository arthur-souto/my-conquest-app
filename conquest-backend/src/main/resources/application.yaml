spring:
  application:
    name: conquest-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/conquest_db}
    username: ${DB_USERNAME:conquest_dev}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  # Set to true in development/staging, false in production
  include-error-details: ${INCLUDE_ERROR_DETAILS:false}

jwt:
  public:
    key: ${JWT_PUBLIC_KEY:file:certs/public.pem}
  private:
    key: ${JWT_PRIVATE_KEY:file:certs/private_pkcs8.pem}
  issuer: conquest

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs