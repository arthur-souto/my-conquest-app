spring:
  application:
    name: conquest-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/conquest_db}
    username: ${DB_USERNAME:conquest_dev}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URI:http://localhost:8080/realms/conquest_realm}


app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  # Set to true in development/staging, false in production
  include-error-details: ${INCLUDE_ERROR_DETAILS:false}



springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8081